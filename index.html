<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIME — Musical Company</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        #home {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 70% at 50% 50%, rgba(204, 0, 0, 0.18) 0%, transparent 70%),
                radial-gradient(ellipse 30% 40% at 80% 20%, rgba(204, 0, 0, 0.08) 0%, transparent 60%),
                var(--black);
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg,
                    transparent,
                    transparent 79px,
                    rgba(204, 0, 0, 0.04) 80px);
        }

        .hero-content {
            position: relative;
            text-align: center;
            z-index: 2;
        }

        .hero-sub {
            font-size: 10px;
            font-weight: 300;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--crimson-light);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s 0.3s forwards;
        }

        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(72px, 12vw, 140px);
            font-weight: 700;
            letter-spacing: 0.15em;
            line-height: 0.9;
            color: var(--off-white);
            text-shadow: 0 0 80px rgba(204, 0, 0, 0.4);
            opacity: 0;
            animation: fadeUp 1s 0.5s forwards;
        }

        .hero-title span {
            color: var(--crimson-light);
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
        }

        .hero-tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 300;
            font-style: italic;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeUp 1s 0.7s forwards;
        }

        .hero-divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--crimson), transparent);
            margin: 2rem auto;
            opacity: 0;
            animation: fadeUp 1s 0.9s forwards;
        }

        .hero-nav-hint {
            display: flex;
            gap: 2rem;
            justify-content: center;
            opacity: 0;
            animation: fadeUp 1s 1.1s forwards;
        }

        .hero-nav-hint a {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(245, 240, 232, 0.3);
            text-decoration: none;
            transition: color 0.3s;
        }

        .hero-nav-hint a:hover {
            color: var(--crimson-light);
        }

        @media (max-width: 600px) {
            .hero-title {
                font-size: 52px;
            }

            .hero-nav-hint {
                flex-wrap: wrap;
                gap: 1rem;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a class="nav-logo" href="index.html"><img src="logo.png" alt="TIME" style="height:90px;vertical-align:middle;"></a>
        <ul class="nav-links">
            <li><a href="about.html">About</a></li>
            <li><a href="works.html">Works</a></li>
            <li><a href="board.html">Board</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section id="home">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <p class="hero-sub">Musical Production Company</p>
            <h1 class="hero-title"><img src="logo.png" alt="TIME" style="height:2.5em;vertical-align:middle;filter:drop-shadow(0 0 40px rgba(204,0,0,0.4));"></h1>
            <p class="hero-tagline">Be a star, and it's our time.</p>
            <div class="hero-divider"></div>
            <div class="hero-nav-hint">
                <a href="about.html">About</a>
                <a href="works.html">Works</a>
                <a href="board.html">Board</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </div>
        </div>
    </section>

    <div style="
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: rgba(204,0,0,0.9);
  color: white;
  font-family: 'Cinzel', serif;
  font-size: 13px;
  letter-spacing: 0.2em;
  padding: 0.8rem 1.5rem;
  border-radius: 2px;
  z-index: 9999;
  backdrop-filter: blur(4px);
">
        🚧 현재 사이트 수정 중입니다
    </div>

</body>

</html>
